{% extends "layout.html" %}
{% load static %}

{% block content %}
<div class="content-grid content-grid-split">
    <section class="panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">图像上传</p>
                <h3>病虫害检测任务</h3>
            </div>
            <span class="panel-tag">Mock 推理链路</span>
        </div>

        <form id="diseaseForm" class="upload-form">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">地块编号</label>
                    <input type="text" name="plot_code" class="form-control control-dark" placeholder="例如 B02 / C01">
                </div>
                <div class="col-md-6">
                    <label class="form-label">备注</label>
                    <input type="text" name="remarks" class="form-control control-dark" placeholder="可填写巡检批次、样本来源">
                </div>
            </div>

            <label class="upload-dropzone mt-3" for="diseaseImageInput">
                <input id="diseaseImageInput" name="image" type="file" accept="image/*" required hidden>
                <div>
                    <strong>点击上传病虫害样图</strong>
                    <p>支持 JPG / PNG，按真实业务流程提交至后端接口。</p>
                </div>
            </label>

            <div class="preview-stage">
                <div class="preview-wrapper">
                    <img id="diseasePreview" alt="病虫害预览图">
                    <div id="diseaseBoxes" class="detection-box-layer"></div>
                </div>
                <div class="preview-meta">
                    <span id="selectedFileName">尚未选择图片</span>
                    <button type="submit" class="btn btn-brand">提交检测</button>
                </div>
            </div>
        </form>
    </section>

    <section class="panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">结果面板</p>
                <h3>检测输出与建议</h3>
            </div>
            <span id="detectionStatus" class="panel-tag">待检测</span>
        </div>
        <div id="detectionResult" class="result-shell">
            <div class="placeholder-block">
                <h4>等待提交检测任务</h4>
                <p>当前页面已预留真实模型推理接口，现阶段返回 mock 结果用于业务演示。</p>
            </div>
        </div>
    </section>
</div>

<section class="panel mt-4">
    <div class="panel-heading">
        <div>
            <p class="eyebrow">历史记录</p>
            <h3>最近检测任务</h3>
        </div>
        <span class="panel-tag">数据库 + Mock 回退</span>
    </div>
    <div id="detectionHistory" class="table-shell"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/disease.js' %}"></script>
{% endblock %}
