{% extends "layout.html" %}
{% load static %}

{% block content %}
<section class="page-section">
    <div id="deviceSummary" class="summary-card-grid"></div>
</section>

<div class="content-grid content-grid-split">
    <section class="panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">设备状态</p>
                <h3>在线 / 离线 / 告警分布</h3>
            </div>
            <span class="panel-tag">ECharts</span>
        </div>
        <div id="deviceStatusChart" class="chart-canvas chart-tall"></div>
    </section>

    <section class="panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">扩展服务</p>
                <h3>基础设施预留状态</h3>
            </div>
            <span class="panel-tag">接口骨架</span>
        </div>
        <div id="infrastructureList" class="stack-list stack-list-dense"></div>
    </section>
</div>

<section class="panel mt-4">
    <div class="panel-heading">
        <div>
            <p class="eyebrow">设备台账</p>
            <h3>园区设备清单</h3>
        </div>
        <span class="panel-tag">状态展示</span>
    </div>
    <div id="deviceTable" class="table-shell"></div>
</section>

<section class="panel mt-4">
    <div class="panel-heading">
        <div>
            <p class="eyebrow">链路关系</p>
            <h3>平台与外围系统连接说明</h3>
        </div>
        <span class="panel-tag">后续扩展</span>
    </div>
    <div id="networkLinks" class="todo-list"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/devices.js' %}"></script>
{% endblock %}
